; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:makergo_esp32c3_supermini]
platform = espressif32
framework = arduino
board = makergo_esp32c3_supermini
board_build.filesystem = littlefs
board_build.variant = super_mini_esp32c3
board_build.variants_dir = custom_variants

monitor_speed = 115200
upload_speed = 460800

build_flags =
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
extra_scripts =
    pre:script/inject_app_version.py
    post:script/generate_compilation_database.py
    post:script/upload_littlefs.py
lib_compat_mode = strict
lib_ldf_mode = chain
lib_deps =
    esp32async/ESPAsyncWebServer@^3.10.3
    bblanchon/ArduinoJson@^7.4.0
    mobizt/ReadyMail@^0.3.8
    mgaman/pdulib@^0.5.11